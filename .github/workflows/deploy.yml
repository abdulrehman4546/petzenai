name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Theme via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          server-dir: public_html/wp-content/themes/petzenai-theme/
          local-dir: ./wp-content/themes/petzenai-theme/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deploy robots.txt and llms.txt
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          server-dir: public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/wp-content/**
            **/node_modules/**
            **/.github/**
            **/wp-admin/**
            **/wp-includes/**
