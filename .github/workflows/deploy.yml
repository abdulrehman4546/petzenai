name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy Theme Files via FTP
        timeout-minutes: 10
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'EOF'
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ftp:passive-mode true
          set ssl:verify-certificate false
          set ftp:ssl-allow false
          set ftp:use-feat false
          mirror -R --parallel=3 --verbose \
            ./wp-content/themes/petzenai-theme/ \
            /public_html6/wp-content/themes/petzenai-theme/
          put robots.txt -o /public_html6/robots.txt
          put llms.txt -o /public_html6/llms.txt
          bye
          EOF
