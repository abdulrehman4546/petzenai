name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy Theme Files via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<EOF
          set ftp:passive-mode true
          set ssl:verify-certificate false
          set ftp:ssl-allow true
          mirror -R --delete --verbose \
            ./wp-content/themes/petzenai-theme/ \
            /public_html6/wp-content/themes/petzenai-theme/
          put robots.txt -o /public_html6/robots.txt
          put llms.txt -o /public_html6/llms.txt
          bye
          EOF
