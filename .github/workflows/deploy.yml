name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Trigger cPanel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Notify Deploy
        run: |
          echo "✅ Push to main detected"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "cPanel Git Version Control will auto-deploy from GitHub"
