name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Auto Deploy Theme
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server deploy
        run: |
          echo "Triggering deploy..."
          curl -f -X POST "https://petzenai.com/pz-webhook.php" \
            -d "token=pz_deploy_2026_secret"
          echo "Done!"
