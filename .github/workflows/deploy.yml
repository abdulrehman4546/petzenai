name: Deploy PetZenAI to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Auto Deploy Theme
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server deploy
        run: |
          echo "Triggering deploy..."
          curl -f "https://petzenai.com/git-deploy.php?token=${{ secrets.DEPLOY_TOKEN }}"
          echo "Done!"
